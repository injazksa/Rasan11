services:
  - type: web
    name: rasan-platform
    env: node
    plan: free
    buildCommand: npm install && npx vite build && rm -rf public/assets && mkdir -p public && cp -r dist/* public/ && echo "Build Cleaned and Updated"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: rasan_secret_key_change_me
    autoDeploy: true
