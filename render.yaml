services:
  - type: web
    name: rasan-platform-full
    env: node
    plan: free
    # إجبار Render على استخدام npm بدلاً من pnpm
    buildCommand: |
      echo "Starting Build Process..."
      # Build Frontend
      cd frontend
      npm install --legacy-peer-deps
      npm run build
      cd ..
      
      # Setup Backend
      cd backend
      npm install --legacy-peer-deps
      mkdir -p public
      cp -r ../frontend/dist/* public/
      cd ..
      echo "Build Completed Successfully!"
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: rasan_secret_key_change_me
    autoDeploy: true
