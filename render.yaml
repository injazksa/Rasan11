services:
  - type: web
    name: rasan-platform-full
    env: node
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: rasan_secret_key_change_me
    autoDeploy: true
