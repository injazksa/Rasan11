services:
  - type: web
    name: rasan-platform
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: rasan_secret_key_change_me
    autoDeploy: true
