services:
  - type: web
    name: rasan-platform-full
    env: node
    plan: free
    buildCommand: |
      # 1. Build Frontend
      echo "--- Building Frontend ---"
      cd frontend
      npm install --legacy-peer-deps
      npm run build
      cd ..
      
      # 2. Setup Backend
      echo "--- Setting up Backend ---"
      cd backend
      npm install --legacy-peer-deps
      
      # 3. Copy Frontend to Backend Public
      echo "--- Copying Frontend to Backend ---"
      mkdir -p public
      rm -rf public/*
      cp -r ../frontend/dist/* public/
      cd ..
      echo "--- Build Finished ---"
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        value: rasan_secret_key_change_me
    autoDeploy: true
